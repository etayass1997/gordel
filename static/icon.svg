<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#1a1a1a"/>
  <!-- tracks base -->
  <rect x="40" y="360" width="320" height="80" rx="40" fill="#3a3530"/>
  <circle cx="80" cy="400" r="40" fill="#2a2520"/>
  <circle cx="320" cy="400" r="40" fill="#2a2520"/>
  <circle cx="200" cy="400" r="25" fill="#2a2520"/>
  <!-- track detail -->
  <rect x="60" y="375" width="280" height="8" rx="4" fill="#4a4540"/>
  <rect x="60" y="417" width="280" height="8" rx="4" fill="#4a4540"/>
  <!-- body -->
  <rect x="60" y="240" width="240" height="130" rx="16" fill="#f59e0b"/>
  <!-- cab -->
  <rect x="80" y="160" width="160" height="100" rx="14" fill="#f59e0b"/>
  <!-- window -->
  <rect x="96" y="176" width="80" height="62" rx="8" fill="#1e3a5f"/>
  <rect x="96" y="176" width="80" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
  <!-- boom arm -->
  <line x1="220" y1="185" x2="410" y2="75" stroke="#f59e0b" stroke-width="36" stroke-linecap="round"/>
  <!-- stick -->
  <line x1="410" y1="75" x2="472" y2="190" stroke="#d97706" stroke-width="30" stroke-linecap="round"/>
  <!-- bucket -->
  <path d="M455 175 L495 220 L468 295 L418 265 Z" fill="#b45309" stroke="#f59e0b" stroke-width="6"/>
  <line x1="418" y1="280" x2="445" y2="310" stroke="#b45309" stroke-width="16" stroke-linecap="round"/>
  <!-- GORDEL text -->
  <text x="256" y="490" text-anchor="middle" fill="#f59e0b" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" letter-spacing="4">גורדל</text>
</svg>
